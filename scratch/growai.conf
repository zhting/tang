

# GrowAI API Server - api.tangletang.top

# 鏀寔 Cloudflare Flexible (HTTP) 鍜?Full (HTTPS) 妯″紡



# HTTP 鐩戝惉 (Cloudflare Flexible 妯″紡)

server {

    listen 80;

    server_name api.tangletang.top ai.tangletang.top;



    client_max_body_size 50M;



    root /home/ubuntu/growai/dist;

    index index.html;



    location /game1/ {

        alias /var/www/game1/;

        index index.html;

        try_files $uri $uri/ =404;

    }



    # ----- FAMILY 2026 APP -----

    location ^~ /family/ {

        root /var/www;

        index index.html;

        try_files $uri $uri/ /family/index.html;

    }

    location ^~ /family/api/ {

        proxy_pass http://127.0.0.1:8001/api/;

        proxy_http_version 1.1;  # Required for multipart uploads
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

    }

    location ^~ /family/api/uploads/ {

        proxy_pass http://127.0.0.1:8001/uploads/;

        proxy_set_header Host $host;

    }

    # ----------------------------



    # ----- HOLYSHIT TOOLS BACKEND -----
    location = /tools {
        return 301 /tools/;
    }

    location ^~ /tools/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        client_max_body_size 15m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_read_timeout 180s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
    }
    # ----------------------------------

    location / {

        try_files $uri $uri/ /index.html;

    }



    location ~* \.(js|css|woff|woff2|ttf|eot)$ {

        expires 1y;

        add_header Cache-Control "public, immutable";

        access_log off;

    }



    location /uploads/ {

        proxy_pass http://127.0.0.1:8000/uploads/;

        proxy_set_header Host $host;

        expires 30d;

    }



    location /socket.io/ {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {

        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_read_timeout 180s;

        proxy_connect_timeout 60s;

        proxy_send_timeout 180s;

    }

}



# HTTPS 鐩戝惉 (Cloudflare Full/Strict 妯″紡)

